kind = "web"
previewPath = "/"
title = "NYC Food Insecurity Vulnerability Dashboard"
version = "1.0.0"
id = "artifacts/nyc-food-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23883

[services.development]
run = "python3 /home/runner/workspace/main.py"

[services.production]
build = [ ]
publicDir = "."
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23883"
BASE_PATH = "/"
