kind = "web"
previewPath = "/"
title = "NYC Food Insecurity Vulnerability Dashboard"
version = "1.0.0"
id = "artifacts/nyc-food-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23883

[services.development]
run = "pnpm --filter @workspace/nyc-food-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyc-food-dashboard", "run", "build" ]
publicDir = "artifacts/nyc-food-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23883"
BASE_PATH = "/"
